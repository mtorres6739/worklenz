user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  client_max_body_size 50m;
  proxy_headers_hash_max_size 1024;
  proxy_headers_hash_bucket_size 128;
  log_format main '$remote_addr - $request_method $uri $status $body_bytes_sent $request_time';
  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;
  include /etc/nginx/cloudflare-realip.conf;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=password:10m rate=5r/m;

  upstream backend { server backend:3000; }
  upstream frontend { server frontend:8080; }

  server {
    listen 80;
    server_name projects.myfusionadmin.com;
    location = /origin-health { return 200 'ok\n'; }
    location / { return 301 https://$host$request_uri; }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name projects.myfusionadmin.com;

    ssl_certificate /etc/nginx/tls/origin.pem;
    ssl_certificate_key /etc/nginx/tls/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:TLS:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /origin-health {
      access_log off;
      return 200 'ok\n';
    }

    location ~ ^/secure/(login|signup|signup/check)$ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/secure/(reset-password|update-password)$ {
      limit_req zone=password burst=2 nodelay;
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 120s;
    }

    location /secure/ {
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /public/ {
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /webhook/ {
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /csrf-token {
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /socket {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 300s;
    }

    location / {
      proxy_pass http://frontend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
