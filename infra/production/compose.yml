name: worklenz

services:
  postgres:
    image: ${DATABASE_IMAGE:?DATABASE_IMAGE must be an immutable GHCR SHA tag}
    user: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    security_opt:
      - no-new-privileges:true

  redis:
    image: ${REDIS_IMAGE:?REDIS_IMAGE must include a digest}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - redis_data:/data
    networks:
      - data
    security_opt:
      - no-new-privileges:true

  migrate:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be an immutable GHCR SHA tag}
    env_file: ${WORKLENZ_ENV_FILE:-.env}
    command: ["node", "scripts/migrate.js", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data
    restart: "no"
    profiles: ["migration"]

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be an immutable GHCR SHA tag}
    restart: unless-stopped
    env_file: ${WORKLENZ_ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/public/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 12
    networks:
      - app
      - data
      - egress
    security_opt:
      - no-new-privileges:true

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE must be an immutable GHCR SHA tag}
    restart: unless-stopped
    environment:
      VITE_API_URL: ${APP_ORIGIN:?APP_ORIGIN must be the canonical Worklenz origin}
      VITE_SOCKET_URL: ""
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 12
    networks:
      - app
    security_opt:
      - no-new-privileges:true

  gateway:
    image: ${GATEWAY_IMAGE:?GATEWAY_IMAGE must be an immutable GHCR SHA tag}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./tls:/etc/nginx/tls:ro
    networks:
      - edge
      - app
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:

networks:
  edge:
  app:
    internal: true
  data:
    internal: true
  egress:
