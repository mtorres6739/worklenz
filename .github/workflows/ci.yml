name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: worklenz
          POSTGRES_USER: worklenz
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U worklenz -d worklenz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: worklenz-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worklenz-backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck:ce
      - run: npm test -- --runInBand
      - name: Fresh CE database and fork migrations
        env:
          POSTGRES_USER: worklenz
          POSTGRES_DB: worklenz
          PGPASSWORD: test-only-password
          PGHOST: 127.0.0.1
          PGUSER: worklenz
          PGDATABASE: worklenz
          DB_USER: worklenz
          DB_PASSWORD: test-only-password
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: worklenz
          WORKLENZ_INITDB_ROOT: ${{ github.workspace }}/worklenz-backend/database
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          bash database/00_init.sh
          node scripts/migrate.js up
          psql -Atc "SELECT to_regclass('public.import_jobs') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.task_template_imports') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.task_template_import_items') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regprocedure('public.can_update_task(uuid,uuid)') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT EXISTS(SELECT 1 FROM information_schema.columns WHERE table_schema = 'public' AND table_name = 'task_templates' AND column_name = 'locked_at')" | grep -qx t
          psql -v ON_ERROR_STOP=1 <<'SQL'
          BEGIN;
          SELECT register_user('{"name":"CI Owner","team_name":"CI Workspace","email":"ci-owner@example.test","password":"test-only-hash","timezone":"UTC"}'::json);
          DO $$
          DECLARE
            owner_id UUID;
            team_id UUID;
            created_project_id UUID;
            created_task_id UUID;
          BEGIN
            IF (SELECT deserialize_user(id) FROM users WHERE email = 'ci-owner@example.test') IS NULL THEN
              RAISE EXCEPTION 'Fresh CE owner session could not be deserialized';
            END IF;

            SELECT id, active_team INTO owner_id, team_id
            FROM users WHERE email = 'ci-owner@example.test';

            WITH template AS (
              INSERT INTO task_templates(name, team_id)
              VALUES ('Legacy compatibility template', team_id)
              RETURNING id
            )
            INSERT INTO task_templates_tasks(template_id, name, total_minutes, parent_task_name)
            SELECT id, 'Legacy compatibility task', 0, NULL FROM template;
            IF NOT EXISTS (
              SELECT 1 FROM task_templates_tasks
              WHERE name = 'Legacy compatibility task' AND item_key LIKE 'legacy-%'
            ) THEN
              RAISE EXCEPTION 'Legacy task template defaults are incompatible';
            END IF;
            SELECT (create_project(json_build_object(
              'name', 'CI Project',
              'key', 'CIP',
              'color_code', '#1677ff',
              'status_id', (SELECT id FROM sys_project_statuses WHERE is_default IS TRUE LIMIT 1),
              'team_id', team_id,
              'user_id', owner_id,
              'project_created_log', '@user created the project',
              'project_member_added_log', '@user joined the project'
            )) ->> 'id')::UUID INTO created_project_id;
            IF created_project_id IS NULL THEN
              RAISE EXCEPTION 'Fresh CE project could not be created';
            END IF;

            UPDATE projects
            SET priority_id = NULL
            WHERE id = created_project_id;
            IF NOT EXISTS (
              SELECT 1
              FROM projects p
              INNER JOIN sys_project_priorities spp ON spp.id = p.priority_id
              WHERE p.id = created_project_id AND spp.name = 'Medium'
            ) THEN
              RAISE EXCEPTION 'Fresh CE project default priority is invalid';
            END IF;

            PERFORM p.currency, p.budget
            FROM projects p
            WHERE p.id = created_project_id;

            PERFORM pm.task_list_group_by, pm.board_group_by
            FROM project_members pm
            WHERE pm.project_id = created_project_id;

            PERFORM t.manual_progress, t.progress_value, t.progress_mode, t.weight,
                    t.member_sort_order
            FROM tasks t
            WHERE t.id = created_task_id;

            PERFORM tm.reports_to_member_id
            FROM team_members tm
            WHERE tm.user_id = owner_id;

            PERFORM o.calculation_method, o.hours_per_day, o.logo_url
            FROM organizations o
            WHERE o.user_id = owner_id;

            IF COALESCE((get_task_complete_ratio(created_task_id) ->> 'ratio')::FLOAT, -1) <> 0 THEN
              RAISE EXCEPTION 'Fresh CE leaf-task progress ratio is invalid';
            END IF;

            IF is_task_creation_restricted(owner_id, created_project_id) THEN
              RAISE EXCEPTION 'Fresh CE owner was incorrectly blocked from task creation';
            END IF;

            SELECT (create_task(json_build_object(
              'name', 'CI Task',
              'project_id', created_project_id,
              'reporter_id', owner_id,
              'team_id', team_id,
              'assignees', json_build_array(),
              'attachments', json_build_array(),
              'labels', json_build_array(),
              'total_minutes', 0,
              'status_id', (
                SELECT ts.id
                FROM task_statuses ts
                WHERE ts.project_id = created_project_id
                ORDER BY ts.sort_order
                LIMIT 1
              )
            )) -> 'task' ->> 'id')::UUID INTO created_task_id;
            IF created_task_id IS NULL THEN
              RAISE EXCEPTION 'Fresh CE task could not be created';
            END IF;

            PERFORM log_project_activity_i18n(
              team_id, created_project_id, owner_id,
              'activityLogs.project.created', '{}'::JSONB, 'CI Project'
            );
            PERFORM log_task_activity_i18n(
              created_task_id, team_id, created_project_id, owner_id,
              'task', 'create', 'activityLogs.task.created', '{}'::JSONB, NULL, NULL
            );
            IF NOT EXISTS (
              SELECT 1 FROM project_logs
              WHERE project_id = created_project_id
                AND i18n_key = 'activityLogs.project.created'
            ) OR NOT EXISTS (
              SELECT 1 FROM task_activity_logs tal
              WHERE tal.task_id = created_task_id
                AND tal.i18n_key = 'activityLogs.task.created'
            ) THEN
              RAISE EXCEPTION 'Fresh CE i18n activity logging failed';
            END IF;
          END
          $$;
          ROLLBACK;
          SQL
      - name: Production dependency gate
        run: npm audit --omit=dev --audit-level=critical

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: worklenz-frontend
    env:
      VITE_EDITION: ce
      VITE_ALLOW_SIGNUPS: "false"
      SENTRY_UPLOAD_SOURCEMAPS: "false"
      VITE_SENTRY_AUTH_TOKEN: ""
      VITE_SENTRY_ORG: ""
      VITE_SENTRY_PROJECT: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worklenz-frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: >-
          npx vitest run
          src/utils/html-entities.test.ts
          src/utils/service-worker-security.test.ts
          src/api/task-templates/task-templates.api.service.test.ts
      - name: Production dependency gate
        run: npm audit --omit=dev --audit-level=critical

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Filesystem vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL
          exit-code: "1"
