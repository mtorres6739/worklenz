name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  self-hosted-gates:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-self-hosted-gates.js

  backend:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: worklenz
          POSTGRES_USER: worklenz
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U worklenz -d worklenz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: worklenz-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worklenz-backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck:ce
      - run: npm test -- --runInBand
      - name: Fresh CE database and fork migrations
        env:
          POSTGRES_USER: worklenz
          POSTGRES_DB: worklenz
          PGPASSWORD: test-only-password
          PGHOST: 127.0.0.1
          PGUSER: worklenz
          PGDATABASE: worklenz
          DB_USER: worklenz
          DB_PASSWORD: test-only-password
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: worklenz
          WORKLENZ_INITDB_ROOT: ${{ github.workspace }}/worklenz-backend/database
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          bash database/00_init.sh
          node scripts/migrate.js up
          psql -Atc "SELECT to_regclass('public.import_jobs') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.task_template_imports') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.task_template_import_items') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.finance_rate_cards') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.project_rate_card_roles') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.finance_work_log_rate_snapshots') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.organization_branding') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.oidc_providers') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.oidc_identities') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.integration_audit_log') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.slack_workspaces') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.slack_request_receipts') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.portal_client_users') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.portal_client_memberships') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.portal_sessions') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.portal_project_access') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.portal_task_comments') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.portal_audit_log') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT to_regclass('public.email_delivery_events') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT COUNT(*) = 5 FROM information_schema.columns WHERE table_schema = 'public' AND table_name = 'email_logs' AND column_name IN ('status','message_id','error_details','delivered_at','updated_at')" | grep -qx t
          psql -Atc "SELECT to_regprocedure('public.update_email_log_status()') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT COUNT(*) = 1 FROM pg_constraint WHERE conrelid = 'portal_project_access'::regclass AND conname = 'portal_project_access_project_unique'" | grep -qx t
          psql -Atc "SELECT COUNT(*) = 7 FROM pg_constraint WHERE conname IN ('portal_session_membership_actor_fk','portal_comment_membership_scope_fk','portal_comment_client_scope_fk','portal_comment_project_scope_fk','portal_comment_task_scope_fk','portal_project_access_client_scope_fk','portal_project_access_project_scope_fk')" | grep -qx t
          psql -Atc "SELECT to_regprocedure('public.can_update_task(uuid,uuid)') IS NOT NULL" | grep -qx t
          psql -Atc "SELECT EXISTS(SELECT 1 FROM information_schema.columns WHERE table_schema = 'public' AND table_name = 'task_templates' AND column_name = 'locked_at')" | grep -qx t
          psql -v ON_ERROR_STOP=1 <<'SQL'
          BEGIN;
          SELECT register_user('{"name":"CI Owner","team_name":"CI Workspace","email":"ci-owner@example.test","password":"test-only-hash","timezone":"UTC"}'::json);
          DO $$
          <<ci_fixture>>
          DECLARE
            owner_id UUID;
            team_id UUID;
            created_project_id UUID;
            created_task_id UUID;
            client_a_id UUID;
            client_b_id UUID;
            project_b_id UUID;
            portal_user_a_id UUID;
            portal_user_b_id UUID;
            membership_a_id UUID;
            membership_b_id UUID;
            duplicate_project_blocked BOOLEAN := FALSE;
          BEGIN
            IF (SELECT deserialize_user(id) FROM users WHERE email = 'ci-owner@example.test') IS NULL THEN
              RAISE EXCEPTION 'Fresh CE owner session could not be deserialized';
            END IF;

            SELECT id, active_team INTO owner_id, team_id
            FROM users WHERE email = 'ci-owner@example.test';

            WITH template AS (
              INSERT INTO task_templates(name, team_id)
              VALUES ('Legacy compatibility template', team_id)
              RETURNING id
            )
            INSERT INTO task_templates_tasks(template_id, name, total_minutes, parent_task_name)
            SELECT id, 'Legacy compatibility task', 0, NULL FROM template;
            IF NOT EXISTS (
              SELECT 1 FROM task_templates_tasks
              WHERE name = 'Legacy compatibility task' AND item_key LIKE 'legacy-%'
            ) THEN
              RAISE EXCEPTION 'Legacy task template defaults are incompatible';
            END IF;
            SELECT (create_project(json_build_object(
              'name', 'CI Project',
              'key', 'CIP',
              'color_code', '#1677ff',
              'status_id', (SELECT id FROM sys_project_statuses WHERE is_default IS TRUE LIMIT 1),
              'team_id', team_id,
              'user_id', owner_id,
              'project_created_log', '@user created the project',
              'project_member_added_log', '@user joined the project'
            )) ->> 'id')::UUID INTO created_project_id;
            IF created_project_id IS NULL THEN
              RAISE EXCEPTION 'Fresh CE project could not be created';
            END IF;

            UPDATE projects
            SET priority_id = NULL
            WHERE id = created_project_id;
            IF NOT EXISTS (
              SELECT 1
              FROM projects p
              INNER JOIN sys_project_priorities spp ON spp.id = p.priority_id
              WHERE p.id = created_project_id AND spp.name = 'Medium'
            ) THEN
              RAISE EXCEPTION 'Fresh CE project default priority is invalid';
            END IF;

            PERFORM p.currency, p.budget
            FROM projects p
            WHERE p.id = created_project_id;

            PERFORM p.calculation_method, p.finance_hours_per_day
            FROM projects p
            WHERE p.id = created_project_id;

            PERFORM pm.task_list_group_by, pm.board_group_by
            FROM project_members pm
            WHERE pm.project_id = created_project_id;

            PERFORM t.manual_progress, t.progress_value, t.progress_mode, t.weight,
                    t.member_sort_order
            FROM tasks t
            WHERE t.id = created_task_id;

            PERFORM tm.reports_to_member_id
            FROM team_members tm
            WHERE tm.user_id = owner_id;

            PERFORM o.calculation_method, o.hours_per_day, o.logo_url
            FROM organizations o
            WHERE o.user_id = owner_id;

            IF COALESCE((get_task_complete_ratio(created_task_id) ->> 'ratio')::FLOAT, -1) <> 0 THEN
              RAISE EXCEPTION 'Fresh CE leaf-task progress ratio is invalid';
            END IF;

            IF is_task_creation_restricted(owner_id, created_project_id) THEN
              RAISE EXCEPTION 'Fresh CE owner was incorrectly blocked from task creation';
            END IF;

            SELECT (create_task(json_build_object(
              'name', 'CI Task',
              'project_id', created_project_id,
              'reporter_id', owner_id,
              'team_id', team_id,
              'assignees', json_build_array(),
              'attachments', json_build_array(),
              'labels', json_build_array(),
              'total_minutes', 0,
              'status_id', (
                SELECT ts.id
                FROM task_statuses ts
                WHERE ts.project_id = created_project_id
                ORDER BY ts.sort_order
                LIMIT 1
              )
            )) -> 'task' ->> 'id')::UUID INTO created_task_id;
            IF created_task_id IS NULL THEN
              RAISE EXCEPTION 'Fresh CE task could not be created';
            END IF;

            PERFORM t.fixed_cost, t.estimated_man_days
            FROM tasks t
            WHERE t.id = created_task_id;

            INSERT INTO task_work_log(time_spent, task_id, user_id)
            VALUES (3600, created_task_id, owner_id);
            IF NOT EXISTS (
              SELECT 1
              FROM finance_work_log_rate_snapshots fwrs
              JOIN task_work_log twl ON twl.id = fwrs.work_log_id
              WHERE twl.task_id = created_task_id
            ) THEN
              RAISE EXCEPTION 'Finance work-log rate snapshot was not captured';
            END IF;

            INSERT INTO clients (name, team_id, email, company_name, contact_person, status, client_portal_enabled)
            VALUES ('CI Client A', team_id, 'client-a@example.test', 'Client A', 'Client A User', 'active', TRUE)
            RETURNING id INTO client_a_id;
            INSERT INTO clients (name, team_id, email, company_name, contact_person, status, client_portal_enabled)
            VALUES ('CI Client B', team_id, 'client-b@example.test', 'Client B', 'Client B User', 'active', TRUE)
            RETURNING id INTO client_b_id;

            SELECT (create_project(json_build_object(
              'name', 'CI Client B Project',
              'key', 'CIB',
              'color_code', '#1677ff',
              'status_id', (SELECT id FROM sys_project_statuses WHERE is_default IS TRUE LIMIT 1),
              'team_id', team_id,
              'user_id', owner_id,
              'project_created_log', '@user created the project',
              'project_member_added_log', '@user joined the project'
            )) ->> 'id')::UUID INTO project_b_id;

            INSERT INTO portal_client_users (email, name, password_hash)
            VALUES ('client-a@example.test', 'Client A User', 'test-only-hash')
            RETURNING id INTO portal_user_a_id;
            INSERT INTO portal_client_users (email, name, password_hash)
            VALUES ('client-b@example.test', 'Client B User', 'test-only-hash')
            RETURNING id INTO portal_user_b_id;
            INSERT INTO portal_client_memberships
              (client_user_id, team_id, client_id, role, access_level, invited_by, accepted_at)
            VALUES (portal_user_a_id, team_id, client_a_id, 'member', 'comment', owner_id, CURRENT_TIMESTAMP)
            RETURNING id INTO membership_a_id;
            INSERT INTO portal_client_memberships
              (client_user_id, team_id, client_id, role, access_level, invited_by, accepted_at)
            VALUES (portal_user_b_id, team_id, client_b_id, 'member', 'view', owner_id, CURRENT_TIMESTAMP)
            RETURNING id INTO membership_b_id;
            INSERT INTO portal_project_access
              (team_id, client_id, project_id, access_level, can_view_files, created_by)
            VALUES
              (team_id, client_a_id, created_project_id, 'comment', TRUE, owner_id),
              (team_id, client_b_id, project_b_id, 'view', FALSE, owner_id);
            UPDATE projects SET client_portal_visible = TRUE WHERE id IN (created_project_id, project_b_id);

            INSERT INTO portal_task_comments
              (team_id, client_id, project_id, task_id, membership_id, sender_type, sender_name, comment)
            VALUES
              (team_id, client_a_id, created_project_id, created_task_id, membership_a_id,
               'client', 'Client A User', 'Client A private comment');

            IF (SELECT COUNT(*) FROM portal_project_access ppa
                 WHERE ppa.team_id = ci_fixture.team_id
                   AND ppa.client_id = ci_fixture.client_a_id) <> 1
               OR (SELECT COUNT(*) FROM portal_project_access ppa
                    WHERE ppa.team_id = ci_fixture.team_id
                      AND ppa.client_id = ci_fixture.client_b_id) <> 1 THEN
              RAISE EXCEPTION 'Client project scope fixture is invalid';
            END IF;
            IF EXISTS (
              SELECT 1 FROM portal_task_comments ptc
               WHERE ptc.team_id = ci_fixture.team_id
                 AND ptc.client_id = ci_fixture.client_b_id
                 AND ptc.project_id = ci_fixture.created_project_id
            ) THEN
              RAISE EXCEPTION 'Client B could read Client A comments';
            END IF;

            BEGIN
              INSERT INTO portal_project_access
                (team_id, client_id, project_id, access_level, can_view_files, created_by)
              VALUES (team_id, client_b_id, created_project_id, 'view', FALSE, owner_id);
            EXCEPTION WHEN unique_violation THEN
              duplicate_project_blocked := TRUE;
            END;
            IF NOT duplicate_project_blocked THEN
              RAISE EXCEPTION 'One project was assignable to multiple clients';
            END IF;

            PERFORM log_project_activity_i18n(
              team_id, created_project_id, owner_id,
              'activityLogs.project.created', '{}'::JSONB, 'CI Project'
            );
            PERFORM log_task_activity_i18n(
              created_task_id, team_id, created_project_id, owner_id,
              'task', 'create', 'activityLogs.task.created', '{}'::JSONB, NULL, NULL
            );
            IF NOT EXISTS (
              SELECT 1 FROM project_logs
              WHERE project_id = created_project_id
                AND i18n_key = 'activityLogs.project.created'
            ) OR NOT EXISTS (
              SELECT 1 FROM task_activity_logs tal
              WHERE tal.task_id = created_task_id
                AND tal.i18n_key = 'activityLogs.task.created'
            ) THEN
              RAISE EXCEPTION 'Fresh CE i18n activity logging failed';
            END IF;
          END
          $$;
          ROLLBACK;
          SQL
      - name: Production dependency gate
        run: npm audit --omit=dev --audit-level=high

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: worklenz-frontend
    env:
      VITE_EDITION: ce
      VITE_ALLOW_SIGNUPS: "false"
      SENTRY_UPLOAD_SOURCEMAPS: "false"
      VITE_SENTRY_AUTH_TOKEN: ""
      VITE_SENTRY_ORG: ""
      VITE_SENTRY_PROJECT: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worklenz-frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: >-
          npx vitest run
          src/utils/html-entities.test.ts
          src/utils/service-worker-security.test.ts
          src/utils/document-branding.test.ts
          src/api/task-templates/task-templates.api.service.test.ts
          src/layouts/client-portal-layout.test.tsx
          src/components/client-portal/ClientSettingsDrawer.test.tsx
          src/components/projects/integrations/ProjectIntegrationsButton.test.tsx
          src/components/task-drawer/shared/info-tab/comments/client-portal-comments.test.tsx
          src/pages/admin-center/projects/projects.test.tsx
          src/pages/auth/__tests__/LoginPage.test.tsx
      - name: Production dependency gate
        run: npm audit --omit=dev --audit-level=high

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Filesystem vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL
          exit-code: "1"
