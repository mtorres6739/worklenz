name: Build immutable release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: worklenz-backend
            context: worklenz-backend
            file: worklenz-backend/Dockerfile
          - name: frontend
            image: worklenz-frontend
            context: worklenz-frontend
            file: worklenz-frontend/Dockerfile
          - name: database
            image: worklenz-database
            context: .
            file: infra/production/postgres/Dockerfile
          - name: gateway
            image: worklenz-gateway
            context: .
            file: infra/production/gateway/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          provenance: true
          sbom: true
          tags: ghcr.io/mtorres6739/${{ matrix.image }}:${{ github.sha }}
          build-args: |
            RELEASE_VERSION=${{ github.sha }}
            VITE_EDITION=ce
            VITE_ALLOW_SIGNUPS=false
      - name: Verify backend migration runtime
        if: matrix.name == 'backend'
        run: >-
          docker run --rm --entrypoint sh
          ghcr.io/mtorres6739/${{ matrix.image }}:${{ github.sha }}
          -c 'test -x /app/node_modules/.bin/node-pg-migrate'
      - name: Scan immutable image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/mtorres6739/${{ matrix.image }}:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
