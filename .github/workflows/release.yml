name: Build immutable release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: worklenz-backend
            context: worklenz-backend
            file: worklenz-backend/Dockerfile
          - name: frontend
            image: worklenz-frontend
            context: worklenz-frontend
            file: worklenz-frontend/Dockerfile
          - name: database
            image: worklenz-database
            context: .
            file: infra/production/postgres/Dockerfile
          - name: gateway
            image: worklenz-gateway
            context: .
            file: infra/production/gateway/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          provenance: true
          sbom: true
          tags: ghcr.io/mtorres6739/${{ matrix.image }}:${{ github.sha }}
          build-args: |
            RELEASE_VERSION=${{ github.sha }}
            VITE_EDITION=ce
            VITE_ALLOW_SIGNUPS=false
      - name: Verify backend runtime
        if: matrix.name == 'backend'
        run: |
          image="ghcr.io/mtorres6739/${{ matrix.image }}:${{ github.sha }}"
          docker run --rm --entrypoint sh "$image" -ec '
            test -x /app/node_modules/.bin/node-pg-migrate
            node -e "require.resolve(\"swagger-ui-express\"); require.resolve(\"yamljs\")"
          '
          docker run --rm --entrypoint node \
            -e NODE_ENV=production \
            -e IMPORT_WORKER_ENABLED=false \
            -e ENABLE_GOOGLE_LOGIN=false \
            -e ENABLE_APPLE_LOGIN=false \
            -e STORAGE_PROVIDER=s3 \
            -e S3_REGION=auto \
            -e S3_BUCKET=runtime-smoke \
            "$image" \
            -e 'require("./build/app"); setTimeout(() => process.exit(0), 1000)'
      - name: Validate gateway configuration
        if: matrix.name == 'gateway'
        run: |
          tls_dir="$(mktemp -d)"
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -subj '/CN=projects.myfusionadmin.com' \
            -keyout "$tls_dir/origin-key.pem" \
            -out "$tls_dir/origin.pem" >/dev/null 2>&1
          docker run --rm \
            --add-host backend:127.0.0.1 \
            --add-host frontend:127.0.0.1 \
            -v "$tls_dir:/etc/nginx/tls:ro" \
            "ghcr.io/mtorres6739/${{ matrix.image }}:${{ github.sha }}" \
            nginx -t
      - name: Scan immutable image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/mtorres6739/${{ matrix.image }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
